{% extends "base.html" %}
{% block title %}Cadastro - Tech Store{% endblock %}
{% block content %}
<div class="card" style="max-width: 480px; margin: 0 auto;">
    <h2>📝 Criar Conta</h2>
    <form method="POST" action="{{ url_for('cadastro') }}">
        <div class="form-group">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
        </div>
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="••••••••" required>
        </div>
        <div class="form-group">
            <label for="confirmar_senha">Confirmar senha</label>
            <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="••••••••" required>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Cadastrar</button>
            <a href="{{ url_for('login') }}" style="color:#6c757d; font-size:13px; text-decoration:none; margin-left:8px;">
                Já tenho conta
            </a>
        </div>
    </form>
</div>
{% endblock %}
