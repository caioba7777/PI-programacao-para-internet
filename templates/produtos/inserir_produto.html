{% extends "base.html" %}
{% block title %}Novo Produto - Tech Store{% endblock %}
{% block content %}
<div class="card" style="max-width: 520px; margin: 0 auto;">
    <div class="header-row">
        <h2>➕ Novo Produto</h2>
        <a href="{{ url_for('listar_produtos') }}" class="link-back">← Voltar</a>
    </div>
    <form method="POST" action="{{ url_for('inserir_produto') }}">
        <div class="form-group">
            <label for="nome">Nome do produto</label>
            <input type="text" id="nome" name="nome" placeholder="Ex: Mouse Gamer" required>
        </div>
        <div class="form-group">
            <label for="preco">Preço (R$)</label>
            <input type="text" id="preco" name="preco" placeholder="Ex: 150.00" required>
        </div>
        <div class="form-group">
            <label for="estoque">Estoque</label>
            <input type="text" id="estoque" name="estoque" placeholder="Ex: 50" required>
        </div>
        <div class="form-group">
            <label for="categoria_id">Categoria</label>
            <select id="categoria_id" name="categoria_id" required>
                <option value="">Selecione uma categoria</option>
                {% for c in categorias %}
                <option value="{{ c.id }}">{{ c.nome }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{{ url_for('listar_produtos') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
